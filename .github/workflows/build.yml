name: 编译打包 VansonMod

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tipa:
        description: '跳过 TIPA 打包'
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: ver
        run: |
          V=$(grep -i "Version:" control | awk '{print $2}')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "版本: v$V"

      - name: 安装 Theos + ldid
        run: |
          THEOS_DIR="$GITHUB_WORKSPACE/theos"
          echo "THEOS=$THEOS_DIR" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git "$THEOS_DIR" --depth 1

          # 安装 ldid (iOS 伪签名工具)
          brew install ldid

          # 挂载 iOS SDK
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_VER=$(basename "$SDK_PATH" | sed 's/iPhoneOS//;s/\.sdk//')
          mkdir -p "$THEOS_DIR/sdks"
          ln -sf "$SDK_PATH" "$THEOS_DIR/sdks/iPhoneOS${SDK_VER}.sdk"
          echo "SDK 版本: $SDK_VER"

      - name: 编译 (App + 守护进程)
        run: |
          mkdir -p packages
          if [ "${{ github.event.inputs.skip_tipa }}" = "true" ]; then
            make package SKIP_TIPA=1
          else
            make package
          fi

      - name: 查找守护进程产物
        run: |
          echo "===== 守护进程 vansonmodd ====="
          find . -name "vansonmodd" -type f 2>/dev/null || echo "未找到守护进程二进制"
          find .theos -name "vansonmodd*" -type f 2>/dev/null || true
          echo "===== deb 包内容 ====="
          find .theos -name "*.deb" -type f 2>/dev/null | head -5 || echo "未找到 deb"

      - name: 验证产物
        run: |
          echo "===== 编译产物 ====="
          ls -lh packages/ 2>/dev/null || echo "无输出"
          for f in packages/*.tipa; do
            [ -f "$f" ] && echo "TIPA: $f ($(du -sh "$f" | awk '{print $1}'))"
          done

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VansonMod-v${{ steps.ver.outputs.version }}
          path: packages/*.tipa
          retention-days: 90

      - name: 发布 Release (tag 触发)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.tipa
          name: VansonMod v${{ steps.ver.outputs.version }}
          body: |
            ## 变更

            - 🔧 HTTP API 守护进程 vansonmodd 独立运行，开机自启
            - 🚫 移除音频保活机制：App 前台状态恢复正常，不再被误检为 Now Playing
            - 🧹 App 纯粹作为 UI 控制面板，后台 HTTP 由守护进程负责
            - 📦 .deb 包自动安装 LaunchDaemon plist + 守护进程二进制
          generate_release_notes: true
